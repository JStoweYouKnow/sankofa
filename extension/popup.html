<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Forebear Companion</title>
  <style>
    body{font:13px/1.45 system-ui,sans-serif;margin:12px;width:280px;color:#1a1a1a;background:#f7f4ee;}
    h1{font-size:14px;margin:0 0 8px;}
    p{margin:0 0 10px;color:#444;}
    button{width:100%;padding:8px 10px;font:600 13px system-ui,sans-serif;border:1px solid #2c3a55;background:#2c3a55;color:#f4efe6;cursor:pointer;}
    button.secondary{background:transparent;color:#2c3a55;margin-top:8px;}
    #status{margin-top:10px;font-size:12px;color:#555;}
    .ok{color:#2d6a4f;}
    .warn{color:#9a3412;}
  </style>
</head>
<body>
  <h1>Forebear Companion</h1>
  <p>Capture search results from this FamilySearch tab. Open Forebear and review before anything is logged.</p>
  <button type="button" id="captureBtn">Capture results</button>
  <button type="button" class="secondary" id="clearBtn">Clear saved capture</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
